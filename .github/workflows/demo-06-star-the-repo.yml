name: Demo 06 - Star The Repo

on:
  workflow_dispatch:
  watch:
    types:
      - started

jobs:
  change-the-bulb-color:
    name: Change the Demo Bulb Color

    runs-on: ubuntu-latest

    steps:
      - name: Find Random Color
        id: find-random-color
        run: |
          RN=$(( $RANDOM % 9 + 1 ))
          case $RN in
            1)
              COLOR="white"
              ;;
            2)
              COLOR="red"
              ;;
            3)
              COLOR="orange"
              ;;
            4)
              COLOR="yellow"
              ;;
            5)
              COLOR="cyan"
              ;;
            6)
              COLOR="green"
              ;;
            7)
              COLOR="blue"
              ;;
            8)
              COLOR="purple"
              ;;
            9)
              COLOR="pink"
              ;;
            *)
              COLOR="THIS IS BAD"
              ;;
          esac

          echo "Random number: $RN"
          echo "Selected color: $COLOR"
          echo "bulbcolor=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Simulate bulb color change
        run: |
          echo "Repository star event detected."
          echo "Simulated bulb color change to: ${{ steps.find-random-color.outputs.bulbcolor }}"
          echo "This demonstrates event-driven automation beyond traditional CI/CD."
