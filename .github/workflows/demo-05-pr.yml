name: Demo 05 - Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  build-test-branch:
    name: "Build and Test Of PR"

    runs-on: windows-latest

    steps:
      # - name: Make PR Fail
      #  run: exit 1

      - uses: actions/checkout@v4

      - name: Setup .NET Core 5
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 5.0.x

      - name: Install dependencies
        run: dotnet restore "${{ github.workspace }}/mywebapp/mywebapp.sln"

      - name: Build
        run: dotnet build "${{ github.workspace }}/mywebapp/mywebapp.sln" --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test "${{ github.workspace }}/mywebapp/mywebapp.sln" --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory "${{ github.workspace }}/mywebapp/tests/TestResults"

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: XUnit Tests
          path: "**/TestResults/*.trx"
          reporter: dotnet-trx

      - name: Publish
        run: |
          dotnet publish "${{ github.workspace }}/mywebapp/src/mywebapp.csproj" -c Release -o mywebapp

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact name
          name: mywebappbuildartifacts
          # A file, directory or wildcard pattern that describes what to upload
          path: mywebapp/**
          # The desired behavior if no files are found using the provided path.
          if-no-files-found: error
          # Duration after which artifact will expire in days. 0 means using default retention.
          retention-days: 90
